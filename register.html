<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.3/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <script src="scripts.js" defer></script>
  </head>
  <body >
    <header>
      <h2>Formulario de cadastro</h2>
      <div>
        <input type="checkbox" name="change-theme" id="change-theme" />
        <label for="change-theme">
        <i class="bi bi-sun"></i>
        <i class="bi bi-moon"></i>
        </label>
      </div>
    </header>
    <form>
      <label for="input1">LOCAL DE ATENDIMENTO</label>
      <input type="text" id="atendimento" name="input1" onchange="verificarFormulario()"><br><br>

      <label for="input2">MODALIDADE</label><br><br>
      <div class="list-group">
        <a href="#" class="list-group-item">FISICO <input id="modalidadeA" type="checkbox" name="input2" onchange="verificarFormulario()"> </a>
        <a href="#" class="list-group-item">INTELECTUAL <input id="modalidadeA" type="checkbox" name="input2" onchange="verificarFormulario()"></a>
        <a href="#" class="list-group-item">AUDITIVO <input id="modalidadeA" type="checkbox" name="input2" onchange="verificarFormulario()"></a>
      </div>
      
      <label for="input3">PACIENTE</label>
      <input type="text" id="paciente" name="input3" onchange="verificarFormulario()"><br><br>

      <label for="data">DATA DE ATENDIMENTO</label>
      <input type="date" id="data" name="data" onchange="verificarFormulario()"><br><br>

      <label for="input4">CARTÃO SUS</label>
      <input type="number" id="card" name="input4" onchange="verificarFormulario()" onkeydown="return FilterInput(event)" onpaste="handlePaste(event)"><br><br>

      <label for="datasince">DATA DE NASCIMENTO</label>
      <input type="date" id="datasince" name="datasince" onchange="verificarFormulario()"><br><br>

      <label for="input5">ENDEREÇO</label>
      <input type="text" id="endereco" name="input5" onchange="verificarFormulario()"><br><br>

      <label for="input6">CID</label>
      <input type="Number" id="cid" name="input6" onchange="verificarFormulario()" onkeydown="return FilterInput(event)" onpaste="handlePaste(event)"><br><br>

      <input type="submit" id="save" class="btn" value="Salvar" disabled>


    </form>
  </body>
</html>
